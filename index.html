<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🍉 SNS QUEST</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="SNS QUEST">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#5aaa2e">
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
:root{
  --bg:#e8d5a3;--bg2:#dfc990;
  --card:rgba(255,255,255,.72);--card2:rgba(255,248,230,.85);
  --border:rgba(255,255,255,.9);--shadow:rgba(139,100,20,.18);
  --brown:#5c3d1e;--text:#3d2b1a;--text2:#8b6a3e;
  --green:#5aaa2e;--dkgreen:#3d7a1a;
  --red:#e03a3a;--orange:#f07230;--yellow:#f5c518;
  --pink:#f06090;--purple:#9b6dc9;--cyan:#30b8c0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Nunito',system-ui,sans-serif;color:var(--text);min-height:100vh;
  background-color:var(--bg);
  background-image:linear-gradient(rgba(180,140,60,.13) 1px,transparent 1px),linear-gradient(90deg,rgba(180,140,60,.13) 1px,transparent 1px);
  background-size:40px 40px;
  padding-bottom:80px;
}

/* HEADER */
.header{
  background:linear-gradient(135deg,#5aaa2e 0%,#8fd44a 50%,#4d9425 100%);
  padding:14px 16px 10px;position:sticky;top:0;z-index:100;
  box-shadow:0 4px 20px rgba(60,120,0,.3);
}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.logo{font-size:22px;font-weight:900;color:white;text-shadow:0 2px 0 #3d7a1a,0 4px 12px rgba(0,0,0,.2);letter-spacing:2px;}
.logo-sub{font-size:13px;opacity:.85;font-weight:700;}
.header-badge{background:rgba(255,255,255,.25);border:2px solid rgba(255,255,255,.4);border-radius:20px;padding:4px 12px;font-size:13px;color:white;font-weight:800;backdrop-filter:blur(4px);}
.header-bar-wrap{height:8px;background:rgba(255,255,255,.25);border-radius:4px;overflow:hidden;}
.header-bar{height:100%;background:white;border-radius:4px;transition:width .5s;box-shadow:0 0 8px rgba(255,255,255,.8);}

/* BOTTOM NAV TABS */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:rgba(232,213,163,.97);
  backdrop-filter:blur(10px);
  border-top:3px solid rgba(255,255,255,.7);
  box-shadow:0 -4px 20px rgba(139,100,20,.2);
  display:flex;
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:7px 2px 10px;cursor:pointer;transition:all .2s;
  position:relative;
}
.nav-item.active{background:rgba(255,255,255,.45);}
.nav-item.active::before{
  content:'';position:absolute;top:0;left:15%;right:15%;height:3px;
  background:linear-gradient(90deg,var(--green),var(--dkgreen));
  border-radius:0 0 3px 3px;
}
.nav-icon{font-size:19px;line-height:1;}
.nav-label{font-size:9px;font-weight:900;color:var(--brown);margin-top:2px;}
.nav-item.active .nav-label{color:var(--dkgreen);}
/* section blocks */
.sec{display:none;}
.sec.show{display:block;}

/* CONTAINER */
.container{max-width:480px;margin:0 auto;padding:14px 12px;}

/* TAB PAGES */
.tab-page{display:none;}
.tab-page.active{display:block;}

/* SECTION LABEL */
.section-label{
  font-size:13px;font-weight:900;color:var(--brown);
  letter-spacing:1px;margin:14px 0 8px 2px;
  display:flex;align-items:center;gap:8px;
}
.section-label::after{content:'';flex:1;height:2px;background:linear-gradient(90deg,var(--bg2),transparent);border-radius:1px;}

/* CARD BUBBLE */
.card{
  background:var(--card);border-radius:24px;padding:16px;
  border:3px solid var(--border);position:relative;
  box-shadow:0 6px 24px var(--shadow),inset 0 1px 0 rgba(255,255,255,.9);
  backdrop-filter:blur(8px);position:relative;overflow:hidden;
  margin-bottom:14px;
}
.card::after{
  content:'';position:absolute;top:-40%;left:-20%;
  width:60%;height:60%;
  background:radial-gradient(ellipse,rgba(255,255,255,.5) 0%,transparent 70%);
  pointer-events:none;border-radius:50%;
}
.card-title{font-size:12px;font-weight:900;color:var(--dkgreen);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px;}

/* STATS CHIPS */
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px;}
.stat-chip{
  background:var(--card);border-radius:20px;padding:12px 8px;text-align:center;
  border:3px solid var(--border);
  box-shadow:0 4px 16px var(--shadow),inset 0 1px 0 rgba(255,255,255,.9);
  backdrop-filter:blur(6px);
}
.stat-chip-icon{font-size:20px;margin-bottom:2px;}
.stat-chip-val{font-size:24px;font-weight:900;line-height:1.1;}
.stat-chip-val.green{color:var(--green);}
.stat-chip-val.orange{color:var(--orange);}
.stat-chip-val.red{color:var(--red);}
.stat-chip-label{font-size:10px;color:var(--text2);font-weight:800;margin-top:2px;}

/* WATER BAR */
.daily-complete{font-size:13px;font-weight:900;letter-spacing:2px;color:#f5c518;text-shadow:0 2px 6px rgba(180,140,0,.5);display:none;text-align:center;margin-top:6px;animation:pulse 1s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.7;transform:scale(1.06);}}

/* DUAL BATTERY */
.dual-battery-row{display:flex;justify-content:center;align-items:flex-start;gap:24px;}
.battery-sm{width:130px!important;height:200px!important;}
.battery-num-sm{font-size:42px!important;}
/* STREAK + BATTERY HERO */
.streak-energy-row{display:flex;flex-direction:column;align-items:center;gap:0;margin-top:0;position:relative;}
.streak-badge{position:relative;background:linear-gradient(160deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%);border-radius:16px;padding:12px 16px 10px;text-align:center;white-space:nowrap;border:2px solid rgba(255,120,50,.5);box-shadow:0 0 20px rgba(255,100,30,.35),0 6px 20px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.08);overflow:hidden;min-width:80px;z-index:10;}
.streak-badge::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,160,60,.6),transparent);}
.streak-flame{font-size:28px;display:block;line-height:1;filter:drop-shadow(0 0 8px rgba(255,140,0,.8));animation:flicker 1.4s ease-in-out infinite;}
.streak-num{font-size:28px;font-weight:900;color:#fff;line-height:1.1;text-shadow:0 0 12px rgba(255,120,30,.8),0 2px 4px rgba(0,0,0,.5);letter-spacing:-1px;}
.streak-num span{font-size:16px;font-weight:700;opacity:.85;}
.streak-sub{font-size:8px;color:rgba(255,180,80,.9);font-weight:800;letter-spacing:1px;margin-top:2px;display:block;}
.streak-badge::after{content:'';position:absolute;bottom:0;left:0;right:0;height:40%;background:linear-gradient(0deg,rgba(255,80,0,.08),transparent);pointer-events:none;}
@keyframes flicker{0%,100%{transform:scale(1) rotate(-2deg);filter:drop-shadow(0 0 8px rgba(255,140,0,.8));}40%{transform:scale(1.08) rotate(2deg);filter:drop-shadow(0 0 14px rgba(255,200,0,1));}70%{transform:scale(.96) rotate(-1deg);filter:drop-shadow(0 0 6px rgba(255,100,0,.7));}}
/* BATTERY HERO */
.battery-hero{display:flex;flex-direction:column;align-items:center;gap:0;width:100%;}
.battery-hero-label{font-size:13px;font-weight:900;color:var(--brown);letter-spacing:2px;margin-bottom:6px;}
.battery-cap{width:50px;height:13px;background:linear-gradient(90deg,#2ecc71,#7dffaa,#2ecc71);border-radius:8px 8px 0 0;margin:0 auto;box-shadow:0 -3px 10px rgba(46,204,113,.7);}
.battery-body{width:180px;height:260px;border:5px solid #2ecc71;border-radius:0 0 22px 22px;position:relative;overflow:hidden;background:rgba(0,20,8,.1);box-shadow:0 0 36px rgba(46,204,113,.5),0 0 14px rgba(46,204,113,.25),inset 0 0 20px rgba(0,0,0,.08);}
.battery-fill{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(180deg,#b8ffd4 0%,#2ecc71 30%,#1aaa56 70%,#0d6632 100%);transition:height .9s cubic-bezier(.4,0,.2,1);box-shadow:0 -6px 18px rgba(46,204,113,.6);}
.battery-fill.complete{background:linear-gradient(180deg,#fff9c4 0%,#f5c518 35%,#d4a010 100%);box-shadow:0 -6px 18px rgba(245,197,24,.7);}
.battery-fill::after{content:'';position:absolute;top:0;left:6px;width:28%;bottom:0;background:linear-gradient(90deg,rgba(255,255,255,.22),transparent);border-radius:3px;}
.battery-segs{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;justify-content:space-between;pointer-events:none;padding:3px 0;}
.battery-seg{display:none;}
.battery-count-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:3;pointer-events:none;}
.battery-count-num{font-size:58px;font-weight:900;color:#fff;text-shadow:0 3px 14px rgba(0,0,0,.45);line-height:1;}
.battery-count-total{font-size:16px;color:rgba(255,255,255,.95);font-weight:800;text-shadow:0 1px 6px rgba(0,0,0,.3);margin-top:2px;}
.battery-count-pct{font-size:22px;font-weight:900;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.35);margin-top:4px;}
.battery-shine{position:absolute;top:8px;left:12px;width:16px;bottom:8px;background:linear-gradient(90deg,rgba(255,255,255,.2),transparent);border-radius:8px;pointer-events:none;}
@keyframes shimmer{to{left:100%;}}

/* MONTHLY */
.monthly-wrap{margin-top:14px;}
.monthly-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.monthly-label{font-size:12px;font-weight:900;color:var(--brown);}
.monthly-pct-badge{font-size:11px;font-weight:900;padding:3px 10px;background:linear-gradient(135deg,var(--green),var(--dkgreen));color:white;border-radius:12px;box-shadow:0 2px 8px rgba(60,120,0,.3);}
.monthly-bar-wrap{height:22px;background:rgba(200,160,60,.2);border-radius:11px;overflow:hidden;border:2px solid rgba(255,255,255,.6);}
.monthly-bar{height:100%;border-radius:9px;background:linear-gradient(90deg,#5aaa2e,#8fd44a);transition:width .5s;position:relative;overflow:hidden;}
.monthly-bar::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);animation:shimmer 2s infinite;}
.monthly-milestones{display:flex;justify-content:space-between;margin-top:4px;}
.monthly-milestones span{font-size:9px;color:var(--text2);font-weight:800;}

/* GRAPH */
.graph-tabs{display:flex;gap:8px;margin-bottom:10px;}
.g-tab{padding:6px 14px;border-radius:14px;font-size:12px;font-weight:900;cursor:pointer;border:2px solid rgba(255,255,255,.7);color:var(--text2);background:rgba(255,255,255,.5);transition:all .2s;}
.g-tab.active{background:linear-gradient(135deg,var(--green),var(--dkgreen));color:white;border-color:transparent;box-shadow:0 3px 12px rgba(60,120,0,.35);}
canvas{display:block;width:100%!important;}
.list-row{display:flex;gap:8px;margin-bottom:10px;}
.list-row input{flex:1;background:rgba(255,255,255,.7);border:2px solid rgba(255,255,255,.85);border-radius:12px;padding:8px 12px;color:var(--text);font-size:13px;outline:none;font-weight:700;font-family:inherit;}
.list-row input:focus{border-color:var(--green);}
.btn-sm{background:linear-gradient(135deg,var(--green),var(--dkgreen));color:white;border:none;border-radius:12px;padding:8px 14px;font-size:12px;font-weight:900;cursor:pointer;box-shadow:0 3px 10px rgba(60,120,0,.3);transition:all .2s;font-family:inherit;white-space:nowrap;}
.btn-sm:hover{transform:translateY(-1px);}

/* ACCOUNT SUMMARY */
.acc-summary{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);border-radius:14px;border:2px solid var(--border);margin-bottom:12px;box-shadow:0 2px 8px var(--shadow);}
.acc-summary-done{font-size:22px;font-weight:900;color:var(--dkgreen);}
.acc-summary-total{font-size:13px;color:var(--text2);font-weight:800;}
.acc-summary-bar-wrap{flex:1;height:8px;background:rgba(180,150,80,.2);border-radius:4px;overflow:hidden;}
.acc-summary-bar{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--green),var(--dkgreen));transition:width .4s;}
.acc-summary-incomplete{font-size:12px;font-weight:900;color:var(--red);white-space:nowrap;}
/* ACCOUNT CARD */
.account-card{background:var(--card);border-radius:14px;padding:8px 10px 7px;margin-bottom:6px;border:2px solid var(--border);box-shadow:0 2px 8px var(--shadow);position:relative;overflow:hidden;transition:border-color .3s,box-shadow .3s;}
.account-card.done{border-color:rgba(90,170,46,.5);box-shadow:0 2px 10px rgba(90,170,46,.2);background:linear-gradient(135deg,rgba(240,255,235,.9),var(--card));}
.account-card.alert-18{border-color:#e03a3a;box-shadow:0 0 12px rgba(224,58,58,.45);background:linear-gradient(135deg,rgba(255,235,235,.95),var(--card));animation:alertPulse 1.6s ease-in-out infinite;}
.account-card.alert-14{border-color:#f07230;box-shadow:0 0 10px rgba(240,114,48,.35);background:linear-gradient(135deg,rgba(255,245,235,.95),var(--card));}
@keyframes alertPulse{0%,100%{box-shadow:0 0 10px rgba(224,58,58,.4);}50%{box-shadow:0 0 20px rgba(224,58,58,.8);}}
.acc-color-bar{position:absolute;top:0;left:0;right:0;height:3px;}
.account-header{display:flex;align-items:center;gap:6px;margin-top:4px;margin-bottom:6px;}
.account-name{font-weight:900;font-size:13px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.acc-total-badge{background:linear-gradient(135deg,var(--green),var(--dkgreen));color:white;border-radius:9px;padding:2px 8px;font-size:11px;font-weight:900;white-space:nowrap;}
.delete-btn{background:rgba(255,200,200,.5);border:1.5px solid rgba(255,150,150,.4);color:var(--red);border-radius:7px;padding:2px 7px;font-size:10px;cursor:pointer;font-weight:900;font-family:inherit;transition:all .2s;white-space:nowrap;}
.delete-btn:hover{background:var(--red);color:white;}
.btn-complete-all{background:linear-gradient(135deg,#5aaa2e,#3d7a1a);color:#fff;border:none;border-radius:8px;padding:3px 8px;font-size:11px;font-weight:900;cursor:pointer;font-family:inherit;white-space:nowrap;box-shadow:0 2px 6px rgba(60,120,0,.35);transition:all .18s;}
.btn-complete-all:hover{transform:scale(1.06);box-shadow:0 3px 10px rgba(60,120,0,.5);}
.btn-reset-all{background:rgba(220,200,160,.35);border:1.5px solid rgba(180,150,80,.3);color:var(--brown);border-radius:7px;padding:2px 6px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .18s;}
.btn-reset-all:hover{background:rgba(180,150,80,.3);}
.check-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;}
.check-item{display:flex;align-items:center;gap:4px;background:rgba(255,245,210,.55);border-radius:8px;padding:4px 6px;border:1px solid rgba(210,180,120,.25);}
.check-label{font-size:8.5px;color:var(--brown);font-weight:900;line-height:1.3;min-width:38px;}
.check-label-sub{font-size:7.5px;color:var(--text2);font-weight:700;}
.check-btns{display:flex;align-items:center;gap:3px;margin-left:auto;}
.check-count{font-size:15px;font-weight:900;color:var(--dkgreen);min-width:20px;text-align:center;transition:transform .15s;}
.check-count.pop{animation:cntPop .25s ease-out;color:var(--orange);}
@keyframes cntPop{0%{transform:scale(1);}50%{transform:scale(1.7);}100%{transform:scale(1);}}
.btn-check{width:22px;height:22px;border-radius:50%;border:none;font-size:13px;font-weight:900;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;font-family:inherit;line-height:1;}
.btn-plus{background:linear-gradient(135deg,var(--green),var(--dkgreen));color:white;box-shadow:0 2px 6px rgba(60,120,0,.35);}
.btn-plus:hover{transform:scale(1.15);}
.btn-plus:disabled{background:#ccc;box-shadow:none;cursor:not-allowed;opacity:.45;transform:none!important;}
.btn-minus{background:rgba(255,255,255,.8);color:var(--text2);border:1.5px solid rgba(200,180,140,.4);}
.btn-minus:hover{background:var(--red);color:white;border-color:var(--red);}
.check-sep{display:none;}
.acc-progress-wrap{margin-top:5px;}
.list-hist-row{display:flex;align-items:center;gap:8px;padding:7px 12px;background:var(--card);border-radius:10px;border:2px solid var(--border);margin-bottom:5px;cursor:pointer;font-size:13px;transition:background .15s;}
.list-hist-row:hover{background:#fffbe6;}
.acc-progress-bar-wrap{height:4px;background:rgba(180,150,80,.2);border-radius:3px;overflow:hidden;}
.acc-progress-bar{height:100%;border-radius:3px;transition:width .4s;}

/* ADD ACCOUNT */
.add-account-form{background:linear-gradient(135deg,rgba(255,240,200,.8),rgba(255,250,220,.8));border-radius:20px;padding:14px;border:3px dashed rgba(180,150,80,.4);margin-top:10px;box-shadow:inset 0 1px 0 rgba(255,255,255,.8);}
.add-account-form .form-title{font-size:12px;font-weight:900;color:var(--brown);margin-bottom:10px;}
.form-row{display:flex;gap:8px;margin-bottom:8px;}
.form-input{flex:1;background:rgba(255,255,255,.8);border:2px solid rgba(255,255,255,.9);border-radius:12px;padding:9px 12px;color:var(--text);font-size:13px;outline:none;font-weight:700;font-family:inherit;}
.form-input:focus{border-color:var(--green);}
.form-input::placeholder{color:var(--text2);font-weight:600;}
.btn-add{width:100%;padding:12px;background:linear-gradient(135deg,#5aaa2e,#3d7a1a);color:white;border:none;border-radius:14px;font-size:14px;font-weight:900;cursor:pointer;box-shadow:0 5px 18px rgba(60,120,0,.4),0 2px 0 #2d5a10;transition:all .2s;letter-spacing:1px;font-family:inherit;}
.btn-add:hover{transform:translateY(-1px);}

/* REWARDS */
.reward-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:linear-gradient(135deg,rgba(255,240,200,.8),rgba(255,250,220,.8));border-radius:14px;margin-bottom:8px;border:2px solid rgba(255,255,255,.85);transition:all .3s;position:relative;overflow:hidden;}
.reward-item.achieved{border-color:rgba(255,220,50,.7);background:linear-gradient(135deg,rgba(255,248,180,.9),rgba(255,240,200,.9));box-shadow:0 3px 16px rgba(245,197,24,.3);}
.reward-item.achieved::before{content:'✨';position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:18px;}
.reward-threshold{font-size:15px;font-weight:900;color:var(--dkgreen);min-width:64px;}
.reward-name{flex:1;font-size:13px;font-weight:800;color:var(--text);}
.reward-badge{font-size:11px;font-weight:900;color:white;background:linear-gradient(135deg,#f5c518,#f07230);padding:3px 10px;border-radius:10px;box-shadow:0 2px 8px rgba(245,197,24,.4);}
.reward-del{background:none;border:none;color:rgba(180,150,80,.5);cursor:pointer;font-size:16px;padding:0 4px;}
.reward-del:hover{color:var(--red);}
.reward-add{display:flex;gap:6px;margin-top:10px;}
.reward-add input{flex:1;background:rgba(255,255,255,.8);border:2px solid rgba(255,255,255,.9);border-radius:10px;padding:8px 10px;color:var(--text);font-size:12px;outline:none;font-weight:700;font-family:inherit;}
.reward-add input:focus{border-color:var(--green);}
.reward-add input[type=number]{width:80px;flex:none;}

/* RESET */
.btn-reset{width:100%;padding:11px;background:linear-gradient(135deg,#f07230,#e03a3a);color:white;border:none;border-radius:14px;font-size:13px;font-weight:900;cursor:pointer;box-shadow:0 4px 14px rgba(224,58,58,.35),0 2px 0 #b02020;font-family:inherit;letter-spacing:1px;margin-top:10px;}
.btn-reset:hover{opacity:.9;}

/* FRUIT DECOS */
.fruit-deco{position:fixed;pointer-events:none;z-index:0;font-size:28px;opacity:.15;animation:floatFruit 6s ease-in-out infinite;}
@keyframes floatFruit{0%,100%{transform:translateY(0) rotate(-5deg);}50%{transform:translateY(-12px) rotate(5deg);}}

/* PARTICLES */
.particle{position:fixed;pointer-events:none;z-index:9999;font-size:18px;font-weight:900;animation:floatUp 1s ease-out forwards;}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-90px) scale(1.6);}}
@keyframes confetti-fall{0%{transform:translateY(-10px) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}
.confetti-piece{position:fixed;width:9px;height:9px;pointer-events:none;z-index:9999;animation:confetti-fall linear forwards;}
</style>
</head>
<body>

<div class="fruit-deco" style="top:8%;left:3%;animation-delay:0s">🍉</div>
<div class="fruit-deco" style="top:20%;right:4%;animation-delay:1s">🍊</div>
<div class="fruit-deco" style="top:45%;left:2%;animation-delay:2s">🍋</div>
<div class="fruit-deco" style="top:65%;right:3%;animation-delay:.5s">🍇</div>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="logo">🍉 SNS QUEST <span class="logo-sub">タブ版</span></div>
    <div class="header-badge" id="headerStats">0 / 3600</div>
  </div>
  <div class="header-bar-wrap"><div class="header-bar" id="headerBar" style="width:0%"></div></div>
</div>

<div class="container">

  <!-- ===== SECTION: STATS CHIPS (全体・ホーム共通) ===== -->
  <div class="sec" id="sec-chips">
    <div class="stats-row" style="margin-top:4px;">
      <div class="stat-chip"><div class="stat-chip-icon">📅</div><div class="stat-chip-val green" id="chipDaily">0</div><div class="stat-chip-label">TODAY</div></div>
      <div class="stat-chip"><div class="stat-chip-icon">📈</div><div class="stat-chip-val orange" id="chipMonthly">0</div><div class="stat-chip-label">MONTHLY</div></div>
      <div class="stat-chip"><div class="stat-chip-icon">🔥</div><div class="stat-chip-val red" id="chipStreak">0</div><div class="stat-chip-label">STREAK</div></div>
    </div>
  </div>

  <!-- ===== SECTION: DASHBOARD ===== -->
  <div class="sec" id="sec-dashboard">
    <div class="section-label">🎯 達成率</div>
    <div class="card">
      <div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:10px;">
        <div class="streak-badge" id="streakBadge"><span class="streak-flame">🔥</span><div class="streak-num">0<span>日</span></div><span class="streak-sub">連続投稿数</span></div>
      </div>
      <div style="display:flex;align-items:flex-start;gap:12px;">
      <div class="dual-battery-row" style="flex:1;padding-right:70px;margin:0 auto;">
        <!-- DAILY -->
        <div class="battery-hero">
          <div class="battery-hero-label">⚡ DAILY</div>
          <div class="battery-cap"></div>
          <div style="position:relative;">
            <div class="battery-body battery-sm">
              <div class="battery-fill" id="energyBar" style="height:0%"></div>
              <div class="battery-count-overlay">
                <div class="battery-count-num battery-num-sm" id="dailyCount">0</div>
                <div class="battery-count-total" id="dailyGoalLabel">/ 210</div>
                <div class="battery-count-pct" id="dailyPct">0%</div>
              </div>
              <div class="battery-shine"></div>
            </div>
          </div>
        </div>
        <!-- MONTHLY -->
        <div class="battery-hero">
          <div class="battery-hero-label">📅 MONTHLY</div>
          <div class="battery-cap" style="background:linear-gradient(90deg,#9b6dc9,#d4a8f0,#9b6dc9);box-shadow:0 -3px 10px rgba(155,109,201,.7);"></div>
          <div style="position:relative;">
            <div class="battery-body battery-sm" style="border-color:#9b6dc9;box-shadow:0 0 28px rgba(155,109,201,.4),inset 0 0 16px rgba(0,0,0,.05);">
              <div class="battery-fill" id="monthlyFill" style="height:0%;background:linear-gradient(180deg,#d4a8f0 0%,#9b6dc9 35%,#6a3d9a 100%);box-shadow:0 -5px 14px rgba(155,109,201,.5);"></div>
              <div class="battery-count-overlay">
                <div class="battery-count-num battery-num-sm" id="monthlyCountBig">0</div>
                <div class="battery-count-total" id="monthlyGoalLabel">/ ?</div>
                <div class="battery-count-pct" id="monthlyPct">0%</div>
              </div>
              <div class="battery-shine"></div>
            </div>
            <div id="batteryRewardMarkers" style="position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;overflow:visible;z-index:10;"></div>
          </div>
        </div>
      </div>
      </div>
      <div class="daily-complete" id="dailyComplete" style="margin-top:8px;">🏆 DAILY COMPLETE! 🍉</div>
      <div id="rewardProgress" style="margin-top:10px;"></div>
      <button class="btn-reset" onclick="confirmMonthlyReset()" style="margin-top:10px;">🔄 月初リセット</button>
    </div>
  </div>

  <!-- ===== SECTION: GRAPHS ===== -->
  <div class="sec" id="sec-graphs">
    <div class="section-label">📊 グラフ</div>
    <div class="card">
      <div class="graph-tabs">
        <div class="g-tab active" onclick="switchGraph('post',this)">🍊 投稿数</div>
        <div class="g-tab" onclick="switchGraph('list',this)">🍋 リスト数</div>
      </div>
      <div id="graph-post"><canvas id="postGraph" height="200"></canvas></div>
      <div id="graph-list" style="display:none">
        <div class="list-row">
          <input type="number" id="listInput" placeholder="今日のリスト数" />
          <button class="btn-sm" onclick="addListCount()">📝 記録</button>
        </div>
        <canvas id="listGraph" height="170"></canvas>
        <div id="listHistoryWrap" style="margin-top:10px;"></div>
      </div>
    </div>
  </div>

  <!-- ===== SECTION: ACCOUNTS ===== -->
  <div class="sec" id="sec-accounts">
    <div class="section-label">🍒 アカウント</div>
    <div id="accountsList"></div>
    <div class="add-account-form">
      <div class="form-title">🌱 新しいアカウントを追加</div>
      <div class="form-row"><input class="form-input" id="inputUsername" placeholder="@ユーザーネーム" /></div>
      <div class="form-row"><input class="form-input" id="inputDevice" placeholder="使用端末名（例：iPhone15）" /></div>
      <button class="btn-add" onclick="addAccount()">＋ アカウントを追加する</button>
    </div>
  </div>

  <!-- ===== SECTION: REWARDS ===== -->
  <div class="sec" id="sec-rewards">
    <div class="section-label">🎁 報酬システム</div>
    <div class="card">
      <div id="rewardsList"></div>
      <div class="reward-add">
        <div style="display:flex;align-items:center;gap:4px;flex-shrink:0;">
          <input type="number" id="rewardThreshold" placeholder="50" min="1" max="100" style="width:60px;" />
          <span style="font-size:13px;font-weight:900;color:var(--brown);">%</span>
        </div>
        <input type="text" id="rewardName" placeholder="報酬内容（例：ラーメン食べる）" />
        <button class="btn-sm" onclick="addReward()">追加</button>
      </div>
    </div>
  </div>

  <div style="height:10px;"></div>
</div>

<!-- BOTTOM NAV (5タブ) -->
<div class="bottom-nav">
  <div class="nav-item active" id="nav-all" onclick="switchPage('all')">
    <div class="nav-icon">🌟</div><div class="nav-label">全体</div>
  </div>
  <div class="nav-item" id="nav-home" onclick="switchPage('home')">
    <div class="nav-icon">🍉</div><div class="nav-label">ホーム</div>
  </div>
  <div class="nav-item" id="nav-graphs" onclick="switchPage('graphs')">
    <div class="nav-icon">🍊</div><div class="nav-label">グラフ</div>
  </div>
  <div class="nav-item" id="nav-accounts" onclick="switchPage('accounts')">
    <div class="nav-icon">🍒</div><div class="nav-label">アカウント</div>
  </div>
  <div class="nav-item" id="nav-rewards" onclick="switchPage('rewards')">
    <div class="nav-icon">🎁</div><div class="nav-label">報酬</div>
  </div>
</div>

<script>
const ACC_COLORS=['linear-gradient(90deg,#5aaa2e,#3d7a1a)','linear-gradient(90deg,#f07230,#e03a3a)','linear-gradient(90deg,#f5c518,#f07230)','linear-gradient(90deg,#30b8c0,#5aaa2e)','linear-gradient(90deg,#9b6dc9,#f06090)','linear-gradient(90deg,#e03a3a,#f07230)'];
function getDailyGoal(){return Math.max(1,(state.accounts||[]).length*7);}
function getMonthlyGoal(){const d=new Date();const days=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();return getDailyGoal()*days;}
// 後方互換用エイリアス（グラフの目標線で使用）
const DAILY_GOAL=120,MONTHLY_GOAL=3600;
const DEFAULT_ACCOUNTS=[
  {id:1,device:'A', username:'@haruka1394333'},
  {id:2,device:'D', username:'@rio_gifter23'},
  {id:3,device:'E', username:'@aoi_born2002'},
  {id:4,device:'E', username:'@erika_37371'},
  {id:5,device:'G', username:'@gryphon_premium'},
  {id:6,device:'A1',username:'@Tom_anderson594'},
  {id:7,device:'A1',username:'@kazu_happyman'},
  {id:8,device:'A3',username:'@dragon_specials'},
  {id:9,device:'A4',username:'@boxing_gift'},
  {id:10,device:'A4',username:'@masaki_7958'},
  {id:11,device:'A5',username:'@ruru_pre4040'},
  {id:12,device:'A5',username:'@master_coin777'},
  {id:13,device:'A5',username:'@remi_givegive'},
  {id:14,device:'A6',username:'@honki_man'},
  {id:15,device:'A6',username:'@hikaru_pre56'},
  {id:16,device:'A6',username:'@dream_monk7'},
  {id:17,device:'B2',username:'@sion_owner'},
  {id:18,device:'B3',username:'@yamasiro_man'},
  {id:19,device:'B3',username:'@Yamamoto_735'},
  {id:20,device:'B4',username:'@100face_gifter'},
  {id:21,device:'B4',username:'@suzuka_7035'},
  {id:22,device:'B5',username:'@aniki__kansai'},
  {id:23,device:'B5',username:'@hina_kubari90'},
  {id:24,device:'B5',username:'@lonlon_754'},
  {id:25,device:'B6',username:'@naruto_pre'},
  {id:26,device:'B6',username:'@Sinozaki_gift'},
  {id:27,device:'B6',username:'@ren_host_worker'},
  {id:28,device:'C1',username:'@yuika_hotel'},
  {id:29,device:'C1',username:'@gold_osaka777'},
  {id:30,device:'C1',username:'@reina_cabaret'},
].map((a,i)=>({...a,checks:{reply:0,planned:0,achievement:0,repost:0},colorIdx:i%ACC_COLORS.length}));
let state={accounts:[],monthlyTotal:0,dailyDate:'',dailyCount:0,streak:0,energy:0,rewards:[{threshold:100,name:'好きなものを食べる'},{threshold:500,name:'新しいゲームを買う'},{threshold:1000,name:'旅行に行く'}],history:{},listHistory:{}};
function save(){localStorage.setItem('snsquest_suika_tabs',JSON.stringify(state));}
function calcPoints(acc){
  return Math.min(2,Math.floor((acc.checks.reply||0)/5))
    +Math.min(2,acc.checks.planned||0)
    +Math.min(2,acc.checks.achievement||0)
    +Math.min(1,Math.floor((acc.checks.repost||0)/2));
}
function getCheckMax(type){
  const before14=new Date().getHours()<14;
  return{reply:before14?5:10,planned:before14?1:2,achievement:before14?1:2,repost:before14?1:2}[type]||2;
}
function load(){
  const d=localStorage.getItem('snsquest_suika_tabs');
  if(d){state={...state,...JSON.parse(d)};}
  if(!state.accounts||state.accounts.length===0){state.accounts=DEFAULT_ACCOUNTS;}
  // 旧フィールド移行 & dailyCount 再計算
  state.accounts.forEach(a=>{
    if(!a.checks)a.checks={};
    if(a.checks.replyback!==undefined&&a.checks.repost===undefined){a.checks.repost=a.checks.replyback;}
    if(a.checks.reply===undefined)a.checks.reply=0;
    if(a.checks.planned===undefined)a.checks.planned=0;
    if(a.checks.achievement===undefined)a.checks.achievement=0;
    if(a.checks.repost===undefined)a.checks.repost=0;
    // @@ダブル@修正
    if(a.username&&a.username.startsWith('@@'))a.username=a.username.slice(1);
  });
  state.dailyCount=state.accounts.reduce((s,a)=>s+calcPoints(a),0);
}
function today(){return new Date().toISOString().split('T')[0];}
function checkDateReset(){
  const t=today();
  if(state.dailyDate!==t){
    if(state.dailyDate){const diff=(new Date(t)-new Date(state.dailyDate))/86400000;if(diff===1&&state.dailyCount>=DAILY_GOAL)state.streak++;else if(diff>1||state.dailyCount<DAILY_GOAL)state.streak=0;}
    if(state.dailyDate&&state.dailyCount>0)state.history[state.dailyDate]=(state.history[state.dailyDate]||0)+state.dailyCount;
    state.dailyDate=t;state.dailyCount=0;state.accounts.forEach(a=>a.checks={reply:0,planned:0,achievement:0,repost:0});state.rewards.forEach(r=>r._achieved=false);save();
  }
}
// どのタブでどのsecを表示するか
const PAGE_MAP={
  all:    ['sec-chips','sec-dashboard','sec-graphs','sec-rewards'],
  home:   ['sec-chips','sec-dashboard'],
  graphs: ['sec-graphs'],
  accounts:['sec-accounts'],
  rewards: ['sec-rewards'],
};
function switchPage(name){
  // 全sec非表示
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('show'));
  // 対象secを表示
  (PAGE_MAP[name]||[]).forEach(id=>{
    const el=document.getElementById(id);if(el)el.classList.add('show');
  });
  // nav active
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const nav=document.getElementById('nav-'+name);if(nav)nav.classList.add('active');
  // グラフ再描画
  if(name==='graphs'||name==='all'){setTimeout(()=>{renderPostGraph();renderListGraph();},50);}
}
function addAccount(){
  const u=document.getElementById('inputUsername').value.trim();
  const d=document.getElementById('inputDevice').value.trim();
  if(!u)return;
  state.accounts.push({id:Date.now(),username:u.startsWith('@')?u:'@'+u,device:d||'未設定',checks:{reply:0,planned:0,achievement:0,repost:0},colorIdx:state.accounts.length%ACC_COLORS.length});
  document.getElementById('inputUsername').value='';document.getElementById('inputDevice').value='';
  save();renderAccounts();
}
function deleteAccount(id){
  if(!confirm('削除しますか？'))return;
  state.accounts=state.accounts.filter(a=>a.id!==id);save();renderAccounts();updateAll();
}
function completeAll(id){
  const acc=state.accounts.find(a=>a.id===id);if(!acc)return;
  const before=calcPoints(acc);
  acc.checks.reply=getCheckMax('reply');
  acc.checks.planned=getCheckMax('planned');
  acc.checks.achievement=getCheckMax('achievement');
  acc.checks.repost=getCheckMax('repost');
  const after=calcPoints(acc);
  const ptDelta=after-before;
  state.dailyCount=state.accounts.reduce((s,a)=>s+calcPoints(a),0);
  state.monthlyTotal=Math.max(0,state.monthlyTotal+ptDelta);
  if(ptDelta>0){state.energy=Math.min(100,state.energy+5*ptDelta);showParticle('🎉 全完了！','#5aaa2e');}
  save();renderAccounts();updateAll();checkRewards();
}
function resetAll(id){
  const acc=state.accounts.find(a=>a.id===id);if(!acc)return;
  const before=calcPoints(acc);
  acc.checks={reply:0,planned:0,achievement:0,repost:0};
  const ptDelta=calcPoints(acc)-before;
  state.dailyCount=state.accounts.reduce((s,a)=>s+calcPoints(a),0);
  state.monthlyTotal=Math.max(0,state.monthlyTotal+ptDelta);
  save();renderAccounts();updateAll();
}
function changeCheck(id,type,delta){
  const acc=state.accounts.find(a=>a.id===id);if(!acc)return;
  const before=calcPoints(acc);
  const nv=(acc.checks[type]||0)+delta;
  if(nv<0||nv>getCheckMax(type))return;
  acc.checks[type]=nv;
  const after=calcPoints(acc);
  const ptDelta=after-before;
  state.dailyCount=state.accounts.reduce((s,a)=>s+calcPoints(a),0);
  state.monthlyTotal=Math.max(0,state.monthlyTotal+ptDelta);
  if(ptDelta>0){state.energy=Math.min(100,state.energy+5);showParticle('+1 🍒','#5aaa2e');}
  save();renderAccounts();updateAll();checkRewards();
}
function renderAccounts(){
  const el=document.getElementById('accountsList');
  if(!state.accounts.length){el.innerHTML='<div style="text-align:center;color:var(--text2);padding:24px;font-size:14px;font-weight:800;background:var(--card);border-radius:20px;border:3px solid var(--border);margin-bottom:10px;box-shadow:0 4px 16px var(--shadow);">🌱 アカウントを追加しよう！</div>';return;}
  // 完了サマリー
  const maxPts=getCheckMax('reply')/5*2+getCheckMax('planned')+getCheckMax('achievement')+Math.floor(getCheckMax('repost')/2);
  const doneCount=state.accounts.filter(a=>calcPoints(a)>=maxPts).length;
  const total=state.accounts.length;
  const pctDone=Math.round(doneCount/total*100);
  const remaining=total-doneCount;
  const summaryHTML=`<div class="acc-summary">
    <div>
      <div class="acc-summary-done">${doneCount}<span style="font-size:13px;color:var(--text2);">/${total}</span></div>
      <div class="acc-summary-total">完了アカウント</div>
    </div>
    <div class="acc-summary-bar-wrap"><div class="acc-summary-bar" style="width:${pctDone}%;"></div></div>
    ${remaining>0?`<div class="acc-summary-incomplete">⚠️ あと${remaining}件</div>`:'<div style="font-size:12px;font-weight:900;color:var(--dkgreen);">✅ 全完了！</div>'}
  </div>`;
  // 端末ごとにグループ化
  const groups={};
  state.accounts.forEach(acc=>{
    const dev=acc.device||'不明';
    if(!groups[dev])groups[dev]=[];
    groups[dev].push(acc);
  });
  const DEVICE_COLORS=['#f07230','#5aaa2e','#30b8c0','#9b6dc9','#e03a3a','#f5c518','#e06080','#3a7ad4'];
  let devIdx=0;
  const normDev=s=>s.replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0));
  const sortDev=(a,b)=>{const na=normDev(a),nb=normDev(b);const as=/^[A-Za-z]$/.test(na),bs=/^[A-Za-z]$/.test(nb);if(as&&!bs)return -1;if(!as&&bs)return 1;return na.localeCompare(nb,undefined,{numeric:true});};
  el.innerHTML=summaryHTML+Object.entries(groups).sort((a,b)=>sortDev(a[0],b[0])).map(([device,accs])=>{
    const dcolor=DEVICE_COLORS[devIdx++%DEVICE_COLORS.length];
    const cards=accs.map(acc=>{
      const pts=calcPoints(acc);
      const color=ACC_COLORS[acc.colorIdx!==undefined?acc.colorIdx:0];
      const pct=Math.round(pts/7*100);
      const mR=getCheckMax('reply'),mP=getCheckMax('planned'),mA=getCheckMax('achievement'),mRp=getCheckMax('repost');
      const r=acc.checks.reply||0,p=acc.checks.planned||0,a=acc.checks.achievement||0,rp=acc.checks.repost||0;
      const mkBtn=(id,type,val,max)=>`
        <button class="btn-check btn-minus" onclick="changeCheck(${id},'${type}',-1)">−</button>
        <div class="check-count">${val}</div>
        <button class="btn-check btn-plus" onclick="changeCheck(${id},'${type}',1)" ${val>=max?'disabled':''}${val>=max&&max<(type==='reply'?10:2)?' title="14:00以降に解放"':''}>＋</button>`;
      const isDone=pts>=maxPts;
      const hr=new Date().getHours();
      const halfMax=Math.min(2,Math.floor(5/5))+Math.min(2,1)+Math.min(2,1)+Math.min(1,Math.floor(1/2)); // 3pts before 14:00
      const alert18=!isDone&&hr>=18;
      const alert14=!isDone&&!alert18&&hr>=14&&pts<halfMax;
      const cardClass=isDone?'done':alert18?'alert-18':alert14?'alert-14':'';
      const alertBadge=alert18?'<span style="font-size:9px;font-weight:900;color:#e03a3a;background:rgba(255,220,220,.9);border-radius:5px;padding:1px 5px;margin-left:4px;">⚠️18時超過</span>':alert14?'<span style="font-size:9px;font-weight:900;color:#f07230;background:rgba(255,240,220,.9);border-radius:5px;padding:1px 5px;margin-left:4px;">⚠️14時未達</span>':'';
      return`<div class="account-card${cardClass?' '+cardClass:''}"><div class="acc-color-bar" style="background:${isDone?'#5aaa2e':alert18?'#e03a3a':alert14?'#f07230':color}"></div>
        <div class="account-header">
          <div class="account-name">${acc.username}${alertBadge}</div>
          <div style="display:flex;gap:4px;align-items:center;">
            <div class="acc-total-badge">🍉 ${pts}/7</div>
            <button class="btn-complete-all" onclick="completeAll(${acc.id})" title="全項目を上限まで記録">✅ 全完了</button>
            <button class="btn-reset-all" onclick="resetAll(${acc.id})" title="リセット">↩</button>
            <button class="delete-btn" onclick="deleteAccount(${acc.id})">×</button>
          </div>
        </div>
        <div class="check-grid">
          <div class="check-item">
            <div class="check-label">💌 リプ返信<br><span class="check-label-sub">${r}/${mR} (5個=1pt)</span></div>
            <div class="check-btns">${mkBtn(acc.id,'reply',r,mR)}</div>
          </div>
          <div class="check-item">
            <div class="check-label">📝 企画投稿<br><span class="check-label-sub">${p}/${mP} (1個=1pt)</span></div>
            <div class="check-btns">${mkBtn(acc.id,'planned',p,mP)}</div>
          </div>
          <div class="check-item">
            <div class="check-label">🏆 実績投稿<br><span class="check-label-sub">${a}/${mA} (1個=1pt)</span></div>
            <div class="check-btns">${mkBtn(acc.id,'achievement',a,mA)}</div>
          </div>
          <div class="check-item">
            <div class="check-label">🔁 リポスト返信<br><span class="check-label-sub">${rp}/${mRp} (2個=1pt)</span></div>
            <div class="check-btns">${mkBtn(acc.id,'repost',rp,mRp)}</div>
          </div>
        </div>
        <div class="acc-progress-wrap">
          <div class="acc-progress-bar-wrap" style="margin-top:5px;"><div class="acc-progress-bar" style="width:${pct}%;background:${color}"></div></div>
        </div>
      </div>`;
    }).join('');
    return`<div style="margin-bottom:14px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;padding:6px 12px;background:${dcolor};border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.12);">
        <span style="font-size:14px;">📱</span>
        <span style="font-weight:900;color:#fff;font-size:14px;letter-spacing:.5px;">${device}</span>
        <span style="margin-left:auto;font-size:11px;color:rgba(255,255,255,.85);font-weight:800;">${accs.length}アカウント</span>
      </div>
      ${cards}
    </div>`;
  }).join('');
}
function updateAll(){
  const daily=state.dailyCount,monthly=state.monthlyTotal;
  const dGoal=getDailyGoal(),mGoal=getMonthlyGoal();
  const dp=Math.min(100,Math.round(daily/dGoal*100));
  const mp=Math.min(100,Math.round(monthly/mGoal*100));
  document.getElementById('headerStats').textContent=`現在 ${monthly} / ${mGoal}`;
  document.getElementById('headerBar').style.width=mp+'%';
  document.getElementById('chipDaily').textContent=daily;
  document.getElementById('chipMonthly').textContent=monthly;
  document.getElementById('chipStreak').textContent=state.streak;
  document.getElementById('dailyCount').textContent=daily;
  document.getElementById('dailyPct').textContent=dp+'%';
  const gl=document.getElementById('dailyGoalLabel');if(gl)gl.textContent='/ '+dGoal;
  const battFill=document.getElementById('energyBar');
  battFill.style.height=dp+'%';
  const comp=document.getElementById('dailyComplete');
  if(dp>=100){comp.style.display='block';battFill.classList.add('complete');}
  else{comp.style.display='none';battFill.classList.remove('complete');}
  document.getElementById('streakBadge').innerHTML=`<span class="streak-flame">🔥</span><div class="streak-num">${state.streak}<span>日</span></div><span class="streak-sub">連続投稿数</span>`;
  const mFill=document.getElementById('monthlyFill');if(mFill)mFill.style.height=mp+'%';
  const mBig=document.getElementById('monthlyCountBig');if(mBig)mBig.textContent=monthly;
  const mgl=document.getElementById('monthlyGoalLabel');if(mgl)mgl.textContent='/ '+mGoal;
  document.getElementById('monthlyPct').textContent=mp+'%';
  renderRewardProgress();
}
function switchGraph(name,el){
  document.getElementById('graph-post').style.display=name==='post'?'':'none';
  document.getElementById('graph-list').style.display=name==='list'?'':'none';
  document.querySelectorAll('.g-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  if(name==='post')renderPostGraph();else{renderListGraph();renderListHistory();}
}
function renderPostGraph(){
  const canvas=document.getElementById('postGraph');
  if(!canvas||canvas.offsetParent===null)return;
  const W=canvas.parentElement.offsetWidth||400;canvas.width=W;canvas.height=200;
  const H=200,ctx=canvas.getContext('2d');ctx.clearRect(0,0,W,H);
  const days=[],counts=[];
  for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const key=d.toISOString().split('T')[0];const p=key.split('-');days.push(parseInt(p[1])+'/'+parseInt(p[2]));counts.push((state.history[key]||0)+(i===0?state.dailyCount:0));}
  const maxVal=Math.max(...counts,120);const pad={l:34,r:10,t:16,b:28};const bw=(W-pad.l-pad.r)/7;
  ctx.strokeStyle='rgba(180,140,60,.2)';ctx.lineWidth=1;
  [0,.25,.5,.75,1].forEach(r=>{const y=pad.t+(H-pad.t-pad.b)*(1-r);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();ctx.fillStyle='#8b6a3e';ctx.font='9px Nunito,sans-serif';ctx.textAlign='right';ctx.fillText(Math.round(maxVal*r),pad.l-4,y+3);});
  const goalY=pad.t+(H-pad.t-pad.b)*(1-DAILY_GOAL/maxVal);ctx.strokeStyle='rgba(245,197,24,.5)';ctx.lineWidth=2;ctx.setLineDash([5,4]);ctx.beginPath();ctx.moveTo(pad.l,goalY);ctx.lineTo(W-pad.r,goalY);ctx.stroke();ctx.setLineDash([]);
  counts.forEach((cnt,i)=>{const x=pad.l+i*bw+bw*.12;const bh=Math.max(3,(cnt/maxVal)*(H-pad.t-pad.b));const y=H-pad.b-bh;const g=ctx.createLinearGradient(0,y,0,H-pad.b);if(cnt>=DAILY_GOAL){g.addColorStop(0,'#8fd44a');g.addColorStop(1,'#3d7a1a');}else{g.addColorStop(0,'#f5c518');g.addColorStop(1,'#f07230');}ctx.fillStyle=g;ctx.beginPath();ctx.roundRect(x,y,bw*.76,bh,[5,5,0,0]);ctx.fill();ctx.fillStyle='#8b6a3e';ctx.font='9px Nunito,sans-serif';ctx.textAlign='center';ctx.fillText(days[i],pad.l+i*bw+bw/2,H-8);});
}
function renderListGraph(){
  const canvas=document.getElementById('listGraph');if(!canvas||canvas.offsetParent===null)return;
  const W=canvas.parentElement.offsetWidth||400;canvas.width=W;canvas.height=170;
  const H=170,ctx=canvas.getContext('2d');ctx.clearRect(0,0,W,H);
  const days=[],counts=[];
  for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const key=d.toISOString().split('T')[0];const p=key.split('-');days.push(parseInt(p[1])+'/'+parseInt(p[2]));counts.push(state.listHistory[key]||0);}
  if(counts.every(c=>c===0)){ctx.fillStyle='#8b6a3e';ctx.font='13px Nunito,sans-serif';ctx.textAlign='center';ctx.fillText('まだデータがありません',W/2,H/2);return;}
  const maxVal=Math.max(...counts,1);const pad={l:34,r:10,t:16,b:28};const pw=(W-pad.l-pad.r)/6;
  ctx.strokeStyle='rgba(180,140,60,.2)';ctx.lineWidth=1;
  [0,.5,1].forEach(r=>{const y=pad.t+(H-pad.t-pad.b)*(1-r);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();ctx.fillStyle='#8b6a3e';ctx.font='9px Nunito,sans-serif';ctx.textAlign='right';ctx.fillText(Math.round(maxVal*r),pad.l-4,y+3);});
  ctx.strokeStyle='#5aaa2e';ctx.lineWidth=3;ctx.lineJoin='round';ctx.beginPath();
  counts.forEach((cnt,i)=>{const x=pad.l+i*pw,y=pad.t+(H-pad.t-pad.b)*(1-cnt/maxVal);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});ctx.stroke();
  counts.forEach((cnt,i)=>{const x=pad.l+i*pw,y=pad.t+(H-pad.t-pad.b)*(1-cnt/maxVal);ctx.fillStyle='#5aaa2e';ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);ctx.fill();ctx.fillStyle='white';ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);ctx.fill();ctx.fillStyle='#8b6a3e';ctx.font='9px Nunito,sans-serif';ctx.textAlign='center';ctx.fillText(days[i],x,H-8);});
}
function addListCount(){const val=parseInt(document.getElementById('listInput').value);if(isNaN(val)||val<0)return;state.listHistory[today()]=val;document.getElementById('listInput').value='';save();renderListGraph();renderListHistory();}
function renderListHistory(){
  const wrap=document.getElementById('listHistoryWrap');if(!wrap)return;
  const entries=Object.entries(state.listHistory).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,14);
  if(!entries.length){wrap.innerHTML='';return;}
  wrap.innerHTML='<div style="font-size:12px;font-weight:800;color:var(--text2);margin-bottom:6px;">📋 履歴（タップで編集）</div>'+entries.map(([key,val])=>{
    const p=key.split('-');const label=parseInt(p[1])+'/'+parseInt(p[2]);
    const isEditing=wrap._editKey===key;
    if(isEditing)return`<div class="list-hist-row" style="background:#fffbe6;border:2px solid #f5c518;"><span style="font-weight:800;min-width:40px;">${label}</span><input id="editListVal" type="number" value="${val}" style="width:70px;border:2px solid #f5c518;border-radius:8px;padding:3px 6px;font-size:13px;font-weight:800;text-align:center;" /><button class="btn-sm" style="font-size:11px;padding:3px 10px;" onclick="saveListEdit('${key}')">保存</button><button class="btn-sm" style="font-size:11px;padding:3px 10px;background:#e03a3a;" onclick="deleteListEntry('${key}')">削除</button></div>`;
    return`<div class="list-hist-row" onclick="startListEdit('${key}')"><span style="font-weight:800;min-width:40px;">${label}</span><span style="font-weight:900;color:var(--accent2);">${val}</span><span style="font-size:10px;color:var(--text2);margin-left:auto;">✏️ 編集</span></div>`;
  }).join('');
}
function startListEdit(key){
  const wrap=document.getElementById('listHistoryWrap');wrap._editKey=key;renderListHistory();
  setTimeout(()=>{const el=document.getElementById('editListVal');if(el){el.focus();el.select();}},50);
}
function saveListEdit(key){
  const el=document.getElementById('editListVal');if(!el)return;
  const val=parseInt(el.value);if(isNaN(val)||val<0)return;
  state.listHistory[key]=val;
  const wrap=document.getElementById('listHistoryWrap');wrap._editKey=null;
  save();renderListGraph();renderListHistory();
}
function deleteListEntry(key){
  delete state.listHistory[key];
  const wrap=document.getElementById('listHistoryWrap');wrap._editKey=null;
  save();renderListGraph();renderListHistory();
}
function getDailyPct(){return Math.min(100,Math.round(state.dailyCount/DAILY_GOAL*100));}
function getMonthlyPct(){return Math.min(100,Math.round(state.monthlyTotal/MONTHLY_GOAL*100));}
function renderRewardProgress(){
  const el=document.getElementById('rewardProgress');
  const markers=document.getElementById('batteryRewardMarkers');
  if(!state.rewards||!state.rewards.length){
    if(el)el.innerHTML='';
    if(markers)markers.innerHTML='';
    return;
  }
  const pct=getMonthlyPct();
  const sorted=[...state.rewards].sort((a,b)=>a.threshold-b.threshold);
  // バッテリー内ライン
  const MARKER_COLORS=['#e03a3a','#f07230','#9b6dc9','#30b8c0','#f5c518'];
  if(markers){
    markers.innerHTML=sorted.map((r,i)=>{
      const achieved=pct>=r.threshold;
      const col=achieved?'#2ecc71':'#e03a3a';
      const shortName=r.name.length>6?r.name.slice(0,5)+'…':r.name;
      return`<div style="position:absolute;bottom:${r.threshold}%;left:0;right:0;height:22px;z-index:5;pointer-events:none;">
        <div style="position:absolute;left:100%;bottom:3px;padding-left:14px;display:flex;align-items:center;gap:3px;white-space:nowrap;">
          <span style="font-size:9px;font-weight:900;color:#fff;background:${col};padding:2px 6px;border-radius:5px;box-shadow:0 1px 4px rgba(0,0,0,.3);line-height:1.4;">${r.threshold}%</span>
          <span style="font-size:9px;font-weight:900;color:#fff;background:rgba(50,30,10,.8);padding:2px 6px;border-radius:5px;box-shadow:0 1px 4px rgba(0,0,0,.3);line-height:1.4;">${shortName}</span>
        </div>
        <div style="position:absolute;right:-14px;bottom:-5px;width:0;height:0;border-top:7px solid transparent;border-bottom:7px solid transparent;border-right:12px solid ${col};filter:drop-shadow(0 0 4px ${col});"></div>
        <div style="position:absolute;left:0;right:0;bottom:0;height:2.5px;background:${col};box-shadow:0 0 5px ${col}99;"></div>
      </div>`;
    }).join('');
  }
  // テキストリスト
  if(el){
    el.innerHTML='<div style="font-size:10px;font-weight:900;color:var(--brown);margin-bottom:5px;letter-spacing:.5px;">🎁 報酬チャレンジ</div>'
      +sorted.map((r,i)=>{
        const achieved=pct>=r.threshold;
        const fill=Math.min(100,Math.round(pct/r.threshold*100));
        const col=achieved?'#1a8a4a':'#e03a3a';
        return`<div style="margin-bottom:5px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;">
            <span style="font-size:11px;font-weight:900;color:${col};">${achieved?'✅':'🎯'} ${r.threshold}% <span style="font-weight:700;color:var(--text2);">${r.name}</span></span>
            <span style="font-size:10px;font-weight:800;color:${col};">${achieved?'達成！':`あと${r.threshold-pct}%`}</span>
          </div>
          <div style="height:4px;background:rgba(180,150,80,.18);border-radius:3px;overflow:hidden;">
            <div style="height:100%;width:${fill}%;background:linear-gradient(90deg,${col},${col}aa);border-radius:3px;transition:width .5s;"></div>
          </div>
        </div>`;
      }).join('');
  }
}
function renderRewards(){
  const pct=getMonthlyPct();const el=document.getElementById('rewardsList');
  if(!state.rewards.length){el.innerHTML='<div style="color:var(--text2);font-size:13px;text-align:center;padding:14px;font-weight:800;">🌱 報酬を追加してください</div>';return;}
  const sorted=[...state.rewards].sort((a,b)=>a.threshold-b.threshold);
  el.innerHTML=sorted.map(r=>{
    const achieved=pct>=r.threshold;
    const oi=state.rewards.findIndex(x=>x.threshold===r.threshold&&x.name===r.name);
    const bar=Math.min(100,Math.round(pct/r.threshold*100));
    return`<div class="reward-item ${achieved?'achieved':''}">
      <div class="reward-threshold">🎯 ${r.threshold}%</div>
      <div style="flex:1;min-width:0;">
        <div class="reward-name">${r.name}</div>
        ${achieved?'':`<div style="margin-top:4px;height:4px;background:rgba(180,150,80,.2);border-radius:3px;overflow:hidden;"><div style="height:100%;width:${bar}%;background:linear-gradient(90deg,var(--green),var(--dkgreen));border-radius:3px;transition:width .4s;"></div></div>`}
      </div>
      ${achieved?'<div class="reward-badge">✓ 達成！</div>':`<div style="font-size:10px;color:var(--text2);font-weight:800;white-space:nowrap;">あと${r.threshold-pct}%</div>`}
      <button class="reward-del" onclick="deleteReward(${oi})">×</button>
    </div>`;
  }).join('');
}
function addReward(){
  const th=parseInt(document.getElementById('rewardThreshold').value);
  const nm=document.getElementById('rewardName').value.trim();
  if(!th||th<1||th>100||!nm)return;
  state.rewards.push({threshold:th,name:nm});
  document.getElementById('rewardThreshold').value='';document.getElementById('rewardName').value='';
  save();renderRewards();
}
function deleteReward(i){state.rewards.splice(i,1);save();renderRewards();}
function checkRewards(){const pct=getMonthlyPct();let na=false;state.rewards.forEach(r=>{if(!r._achieved&&pct>=r.threshold){r._achieved=true;na=true;showParticle('🎉 '+r.name+' 達成！','#f5c518');}});if(na)launchConfetti();renderRewards();renderRewardProgress();}
function confirmMonthlyReset(){if(!confirm('月初リセットします。よろしいですか？'))return;state.monthlyTotal=0;state.energy=0;state.history={};state.listHistory={};state.accounts.forEach(a=>a.checks={reply:0,planned:0,replyback:0});state.rewards.forEach(r=>r._achieved=false);save();renderAccounts();renderRewards();updateAll();}
function showParticle(text,color){const p=document.createElement('div');p.className='particle';p.textContent=text;p.style.color=color;p.style.left=(20+Math.random()*60)+'%';p.style.top='40%';document.body.appendChild(p);setTimeout(()=>p.remove(),1000);}
function launchConfetti(){const cols=['#5aaa2e','#f07230','#f5c518','#e03a3a','#30b8c0','#9b6dc9'];for(let i=0;i<50;i++){const c=document.createElement('div');c.className='confetti-piece';c.style.left=Math.random()*100+'vw';c.style.top='-10px';c.style.background=cols[Math.floor(Math.random()*cols.length)];c.style.borderRadius=Math.random()>.5?'50%':'2px';c.style.animationDuration=(1.5+Math.random()*2)+'s';c.style.animationDelay=Math.random()*.6+'s';document.body.appendChild(c);setTimeout(()=>c.remove(),4000);}}
load();checkDateReset();renderAccounts();renderRewards();updateAll();renderRewardProgress();
switchPage('all'); // 初期表示は全体
window.addEventListener('resize',()=>{renderPostGraph();renderListGraph();});
</script>

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));
}
</script>
